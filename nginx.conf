pid /tmp/nginx.pid;

events {}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;

  server {
    listen       8080;
    server_name  arnovannieuwenhuyzen.com www.arnovannieuwenhuyzen.com;
    root         /usr/share/nginx/html;
    index        index.html;

    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    location = /index.html {
      add_header Cache-Control "no-cache";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
